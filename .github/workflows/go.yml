name: CI

on:
  push:
    branches: main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-26-intel] # , windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          check-latest: true

      - name: Get dependencies
        run: |
          go mod download
          go get github.com/go-pg/pg/v9

      - name: Test
        run: |
          go test -race -count=1 -shuffle=on -cover -covermode=atomic -coverpkg=./... -coverprofile=coverage.out -tags='osusergo,netgo,static' -ldflags='-s -w' ./...

      - name: Build
        run: |
          go build -v .

  coverage:
    runs-on: ubuntu-24.04
    needs: build

    permissions:
      id-token: write

    steps:
      - name: coverage
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          file: ./coverage
          fail_ci_if_error: false
          verbose: true
